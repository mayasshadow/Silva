<body>
    <h1> Haikus</h1>
    
    <h1>caffe d'orzo</h1>
    <p><br>A tempestuous morning
<br>Making bitter milk
<br>Coffee is Overrated</p>

    <h2>boundless</h2>
    <p>Glad I trekked miles abundant 
<br>Across time and space.     
<br>It brought me into your arms</p>

    <h3>picture frame</h3>
    <p>An empty picture frame sits
<br>Anticipating
<br>For a tender memory</p>
